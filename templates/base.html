<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />

    <title>
      {%- if section.title -%}
        {{ section.title }} — Tend the relationships that grow your career
      {%- else -%}
        {{ config.extra.site_name }}
      {%- endif -%}
    </title>

    {% if section.description %}
      <meta name="description" content="{{ section.description }}" />
    {% else %}
      <meta
        name="description"
        content="{{ config.extra.default_site_description }}"
      />
    {% endif %}

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />

    <script>
      // Reveal-on-scroll, progressive: content is visible by default. Only opt
      // in to the hidden→visible animation when JS runs, IntersectionObserver
      // exists, and the user hasn't asked for reduced motion.
      (function () {
        if (
          !("IntersectionObserver" in window) ||
          !window.matchMedia ||
          window.matchMedia("(prefers-reduced-motion: reduce)").matches
        ) {
          return;
        }
        document.documentElement.classList.add("js-reveal");
        document.addEventListener("DOMContentLoaded", function () {
          var io = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  entry.target.classList.add("is-visible");
                  io.unobserve(entry.target);
                }
              });
            },
            { rootMargin: "0px 0px -10% 0px", threshold: 0.12 }
          );
          document.querySelectorAll("[data-reveal]").forEach(function (el) {
            io.observe(el);
          });
        });
      })();
    </script>
  </head>

  <body class="min-h-screen bg-sheepskin font-sans text-espresso antialiased">
    {% block content %}{% endblock content %}
  </body>
</html>
